name: Deploy Worker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Wrangler v4
        run: npm install --save-dev wrangler@4

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx wrangler deploy \
            --var TELEGRAM_TOKEN:"${{ secrets.TELEGRAM_TOKEN }}" \
            --var GH_TOKEN:"${{ secrets.GH_TOKEN }}" \
            --var NOWPAYMENTS_API_KEY:"${{ secrets.NOWPAYMENTS_API_KEY }}" \
            --var NOWPAYMENTS_IPN_SECRET:"${{ secrets.NOWPAYMENTS_IPN_SECRET }}" \
            --var PRO_PRICE:"${{ secrets.PRO_PRICE }}" \
            --var ADMIN_SECRET:"${{ secrets.ADMIN_SECRET }}" \
            --var ADMIN_CHAT_ID:"${{ secrets.ADMIN_CHAT_ID }}"
