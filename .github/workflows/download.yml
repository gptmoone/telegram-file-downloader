name: Download and Split

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'URL of the file to download'
        required: true
      zip_password:
        description: 'Password for the final ZIP'
        required: true
      user_id:
        description: 'Telegram user ID (chatId_timestamp)'
        required: true

jobs:
  download-and-split:
    runs-on: ubuntu-latest
    timeout-minutes: 300   # 5 ساعت برای فایل‌های خیلی بزرگ
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install aria2 for faster multi-connection download
        run: sudo apt-get update && sudo apt-get install -y aria2

      - name: Download file with aria2 (8 connections, retry 5 times)
        run: |
          aria2c -x 8 -s 8 -k 1M \
                 --max-tries=5 \
                 --retry-wait=5 \
                 --connect-timeout=30 \
                 --timeout=60 \
                 --summary-interval=1 \
                 -o input_file "${{ github.event.inputs.file_url }}"
        continue-on-error: false

      - name: Check if download succeeded
        run: |
          if [ ! -f input_file ]; then
            echo "Download failed - file not found"
            exit 1
          fi
          echo "Download completed. File size: $(du -h input_file | cut -f1)"

      - name: Split into chunks (max 50MB per chunk)
        run: |
          mkdir -p chunks
          # حجم هر تکه: 50 مگابایت (می‌تونید به 45MB یا 60MB تغییر بدید)
          split -b 50M -d input_file chunks/archive.7z.
          # نامگذاری تکه‌ها: archive.7z.00, archive.7z.01, ...
          cd chunks
          for f in archive.7z.*; do
            mv "$f" "$f.7z"
          done
          # ترتیب فایل‌ها را حفظ کن
          ls -la

      - name: Create a branch for this user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH_NAME="${{ github.event.inputs.user_id }}"
          git checkout -b "$BRANCH_NAME"
          git add chunks/
          git commit -m "Upload chunks for user ${{ github.event.inputs.user_id }}"
          git push origin "$BRANCH_NAME"

      - name: Notify Worker that processing has started
        run: |
          curl -X POST "${{ secrets.WORKER_URL }}/api/started" \
            -H "Content-Type: application/json" \
            -d '{"user_id": "${{ github.event.inputs.user_id }}"}' \
            -f || true

      - name: Notify progress (every 10 chunks) - optional
        run: |
          TOTAL_CHUNKS=$(ls chunks/ | wc -l)
          echo "total_chunks=$TOTAL_CHUNKS" >> $GITHUB_ENV
          echo "Total chunks: $TOTAL_CHUNKS"
          # هر 10 تکه که آپلود شد، update بفرست
          COUNT=0
          for chunk in chunks/*; do
            COUNT=$((COUNT+1))
            if [ $((COUNT % 10)) -eq 0 ] || [ $COUNT -eq $TOTAL_CHUNKS ]; then
              curl -X POST "${{ secrets.WORKER_URL }}/api/progress" \
                -H "Content-Type: application/json" \
                -d "{\"user_id\": \"${{ github.event.inputs.user_id }}\", \"total_chunks\": $TOTAL_CHUNKS, \"uploaded_chunks\": $COUNT}" \
                -f || true
            fi
          done

      - name: Create final ZIP with password protection
        run: |
          sudo apt-get install -y p7zip-full
          cd chunks
          # تمام تکه‌ها را به یک فایل 7z تبدیل می‌کنیم (اما خود تکه‌ها هم بصورت جدا آپلود شدند)
          7z a -p"${{ github.event.inputs.zip_password }}" -mhe=on archive.7z ./*.7z
          # archive.7z تولید شد (اختیاری)
          ls -la

      - name: Notify completion
        run: |
          curl -X POST "${{ secrets.WORKER_URL }}/api/complete" \
            -H "Content-Type: application/json" \
            -d '{"user_id": "${{ github.event.inputs.user_id }}", "branch": "${{ github.event.inputs.user_id }}"}' \
            -f || true

      - name: Cleanup on failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.WORKER_URL }}/api/failed" \
            -H "Content-Type: application/json" \
            -d '{"user_id": "${{ github.event.inputs.user_id }}"}' \
            -f || true
