name: Clean old branches

on:
  schedule:
    - cron: '0 */3 * * *'   # هر ۳ ساعت یک بار
  workflow_dispatch:         # برای اجرای دستی

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete branches older than 3 hours
        run: |
          NOW=$(date +%s)
          THREE_HOURS_AGO=$((NOW - 10800))
          git branch -r | grep 'origin/user_' | while read branch; do
            # استخراج timestamp از نام branch
            timestamp=$(echo "$branch" | grep -oP 'user_.*_\K\d+')
            if [[ -n "$timestamp" ]] && [[ "$timestamp" -lt "$THREE_HOURS_AGO" ]]; then
              branch_name=${branch#origin/}
              echo "Deleting $branch_name"
              git push origin --delete "$branch_name"
            fi
          done
