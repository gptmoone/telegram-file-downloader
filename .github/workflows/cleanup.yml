name: Clean expired branches

on:
  schedule:
    - cron: '0 * * * *'      # هر ساعت یکبار (دقیقه 0 هر ساعت)
  workflow_dispatch:          # امکان اجرای دستی

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}   # استفاده از توکن شخصی برای دسترسی write

      - name: Delete branches older than 3 hours
        run: |
          THREE_HOURS_AGO=$(date -d '3 hours ago' +%s)
          echo "Deleting branches created before $(date -d @$THREE_HOURS_AGO)"

          git branch -r | grep 'origin/user_' | while read branch; do
            timestamp=$(echo "$branch" | grep -oP 'user_.*_\K\d+')
            if [ -n "$timestamp" ]; then
              if [ "$timestamp" -lt "$THREE_HOURS_AGO" ]; then
                branch_name=${branch#origin/}
                echo "Deleting branch: $branch_name (created at $timestamp)"
                git push origin --delete "$branch_name"
                USER_ID=$(echo "$branch_name" | sed 's/user_\(.*\)_.*/\1/')
                curl -s -X POST "https://telegram-file-bot.gptmoone.workers.dev/api/cleanup" \
                  -H "Content-Type: application/json" \
                  -d "{\"user_id\":\"$USER_ID\"}" || echo "Failed to notify worker for $USER_ID"
              else
                echo "Skipping $branch (timestamp $timestamp) - still valid"
              fi
            else
              echo "Skipping $branch - no timestamp found"
            fi
          done
